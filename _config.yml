title: Power BI Model Architectures
description: A collection of model architectures for Power BI
baseurl: ""
url: "https://power-bi-architectures.joshlevent.com"

# Build settings
markdown: kramdown
theme: just-the-docs
plugins: []

# Theme settings
color_scheme: dark
heading_anchors: true
search_enabled: true
enable_copy_code_button: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - "*.pbix.temp"
  - "*.pbix.backup"
  - CLAUDE.md
  - LICENSE

# Collections
collections:
  architectures:
    output: true
    permalink: /:collection/:path/

just_the_docs:
  collections:
    architectures:
      name: Architectures

# Site settings
locale: "en-US"

# Author
author:
  name: Josh Levent
  email: josh@joshlevent.com
  url: https://joshlevent.com
  github: joshlevent
